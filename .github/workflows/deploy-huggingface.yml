name: Deploy plate_dashboard to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_USERNAME: Jenovo22
  HF_SPACE: plate-dashboard

jobs:
  deploy-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      # ======================================================
      # 1. CLONAR REPOSITORIO DE GITHUB
      # ======================================================
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # ======================================================
      # 2. INSTALAR GIT LFS
      # ======================================================
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      # ======================================================
      # 3. PREPARAR CARPETA PARA HUGGING FACE
      # ======================================================
      - name: Prepare Hugging Face Space folder
        run: |
          rm -rf hf_space
          mkdir hf_space

          rsync -av \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='training_docs' \
            --exclude='video_set' \
            --exclude='inputs' \
            --exclude='outputs' \
            --exclude='*.mp4' \
            --exclude='*.avi' \
            --exclude='*.mov' \
            --exclude='*.mkv' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.png' \
            plate_dashboard/ hf_space/

          mkdir -p hf_space/inputs/images
          mkdir -p hf_space/inputs/videos
          mkdir -p hf_space/outputs/processed_images
          mkdir -p hf_space/outputs/processed_videos

          touch hf_space/inputs/images/.gitkeep
          touch hf_space/inputs/videos/.gitkeep
          touch hf_space/outputs/processed_images/.gitkeep
          touch hf_space/outputs/processed_videos/.gitkeep

      # ======================================================
      # 4. VERIFICAR ARCHIVOS PRINCIPALES
      # ======================================================
      - name: Verify Space files
        run: |
          echo "Contenido preparado para Hugging Face:"
          ls -la hf_space

          echo "Verificando archivos principales..."

          test -f hf_space/app.py || (echo "ERROR: Falta app.py" && exit 1)
          test -f hf_space/config.py || (echo "ERROR: Falta config.py" && exit 1)
          test -f hf_space/Dockerfile || (echo "ERROR: Falta Dockerfile" && exit 1)
          test -f hf_space/requirements.txt || (echo "ERROR: Falta requirements.txt" && exit 1)
          test -f hf_space/README.md || (echo "ERROR: Falta README.md" && exit 1)

          test -d hf_space/src || (echo "ERROR: Falta carpeta src" && exit 1)
          test -d hf_space/models || (echo "ERROR: Falta carpeta models" && exit 1)

          test -f hf_space/models/best.pt || (echo "ERROR: Falta models/best.pt" && exit 1)
          test -f hf_space/models/ocr_best.onnx || (echo "ERROR: Falta models/ocr_best.onnx" && exit 1)

          echo "Verificación completada correctamente."

      # ======================================================
      # 5. VALIDAR TOKEN
      # ======================================================
      - name: Validate Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: El secreto HF_TOKEN no existe o esta vacio."
            exit 1
          fi

          echo "HF_TOKEN encontrado."

      # ======================================================
      # 6. HACER PUSH AL SPACE DE HUGGING FACE
      # ======================================================
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_space

          git init
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git lfs install
          git lfs track "*.pt"
          git lfs track "*.onnx"

          git add .gitattributes
          git add .
          git commit -m "Deploy plate dashboard to Hugging Face"

          git branch -M main
          git remote add space https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}
          git push --force space main
